<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | QR code component</title>
  </head>
  <body>
    <!-- PRA DETERMINAR A LARGURA -->
    <div class="page">
      <div class="card">
        <!-- QR CODE -->
        <header>
          <img
            src="./qr-code-component-main/images/image-qr-code.png"
            alt="qr code"
          />
        </header>
        <!-- TEXTO -->
        <main>
          <h1>Improve your front-end skills by building projects</h1>
          <p>
            Scan the QR code to visit Frontend Mentor and take your coding
            skills to the next level
          </p>
        </main>
      </div>
      <!-- CRÉDITOS -->
      <footer>
        Challenge by
        <a
          href="https://www.frontendmentor.io/challenges/qr-code-component-iux_sIO_H"
          target="_blank"
          >Frontend Mentor</a
        >
        | Code by
        <a href="https://github.com/ruannldr" target="_blank">Luênder</a>
      </footer>
    </div>
  </body>
</html>
