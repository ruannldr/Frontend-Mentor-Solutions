<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Descrição curta do projeto ou da página."
    />
    <link
      rel="shortcut icon"
      href="./assets/images/favicon-32x32.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Results Summary | Frontend Mentor</title>
  </head>
  <body>
    <main class="page">
      <div class="card">
        <!-- CARD ESQUERDO -->
        <section class="your-result">
          
          <h1>Your Result</h1>
          <div class="circle">
            <p><span>76</span></p>
            <p>of 100</p>
          </div>

          <h2>Great</h2>
          <p>
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </section>
        <!-- CARD DIREITO -->
        <section class="summary">
          <h2>Summary</h2>
          <ul>
            <!-- REACTION -->
            <li>
              <div class="info">
                <img src="./assets/images/icon-reaction.svg" alt="" />
                <p>Reaction</p>
              </div>
              <p class="score"><span>80</span> / 100</p>
            </li>
            <!-- MEMORY -->
            <li>
              <div class="info">
                <img src="./assets/images/icon-memory.svg" alt="" />
                <p>Memory</p>
              </div>
              <p class="score"><span>92</span> / 100</p>
            </li>
            <!-- VERBAL -->
            <li>
              <div class="info">
                <img src="./assets/images/icon-verbal.svg" alt="" />
                <p>Verbal</p>
              </div>
              <p class="score"><span>61</span> / 100</p>
            </li>
            <!-- VISUAL -->
            <li>
              <div class="info">
                <img src="./assets/images/icon-visual.svg" alt="" />
                <p>Visual</p>
              </div>
              <p class="score"><span>73</span> / 100</p>
            </li>
          </ul>
          <!-- BOTÃO -->
          <button>Continue</button>
        </section>
      </div>
    </main>
  </body>
</html>
